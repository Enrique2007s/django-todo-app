<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>

<body>
    <h1>Welcome to the Dashboard</h1>
    <p>This is where you can manage your tasks and boards.</p>
     {% for post in object_list %}

         {{ post.title }}
     </h2>
     <p>
         {{ post.excerpt }}
     </p>
     <p>
         {{ post.owner}}
     </p>
     {% endfor %}
</body>

</html>
