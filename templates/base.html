{% load static %}
{% url 'board_list' as board_list_url %}

<!DOCTYPE html>
<html class="h-100" lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DoDash</title>

        <!-- Google fonts css-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
        <!-- Bootstrap css-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!-- Custom css -->
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
    </head>

<body class="d-flex flex-column h-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="{% url 'my-dashboard' %}">DoDash</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{% url 'my-dashboard' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="flex-grow-1">
        <div class="container py-4">
            {% block content %}
            {% endblock content %}
        </div>
    </main>

<footer class="footer mt-auto py-3 bg-dark text-light">
    <div class="container">
        <div class="row align-items-center gy-3">
            <div class="col-12 col-md-4 text-center text-md-start">
                <p class="mb-0">Designed and developed by E.R.S.M.</p>
            </div>

            <div class="col-12 col-md-4 text-center">
                <p class="mb-0">&copy; 2026 DoDash. All rights reserved.</p>
            </div>

            <div class="col-12 col-md-4 text-center text-md-end">
                <div class="d-inline-flex align-items-center gap-3">
                    <span>Contact with</span>
                    <a class="text-light" href="https://www.instagram.com/" aria-label="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a class="text-light" href="https://twitter.com/" aria-label="Twitter">
                        <i class="fa-brands fa-twitter"></i>
                    </a>
                    <a class="text-light" href="https://www.youtube.com/" aria-label="YouTube">
                        <i class="fa-brands fa-youtube"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</footer>

    <!-- Font Awesome js -->
    <script src="https://kit.fontawesome.com/62e6bdb235.js" crossorigin="anonymous"></script>

    <!-- Bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>

</html>
